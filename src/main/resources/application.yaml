server:
  port: 8080

spring:
  application:
    name: secondhand-market

  datasource:
    url: jdbc:mysql://localhost:3306/secondhand_market?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: root
    password: ymx20040210
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect

  data:
    redis:
      host: localhost
      port: 6379

  elasticsearch:
    uris: http://localhost:9200

  servlet:
