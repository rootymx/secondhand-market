      enabled: true
      max-file-size: 10MB
      max-request-size: 10MB

  security:
    user:
      name: admin
      password: 123456
      roles: ADMIN

jwt:
  secret: mySuperSecretKeyForSecondHandMarket12345678901234567890
  expiration: 7200000

logging:
  level:
    root: INFO
    com.example.market: DEBUG
    org.springframework.security: DEBUG
